<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Simulateur patrimonial</title>
    <link rel="stylesheet" href="../styles.css">
  </head>
  <body class="tool-body">
    <main class="tool-page" aria-labelledby="tool-page-title">
      <nav class="tool-nav" aria-label="Navigation du simulateur">
        <a href="../simulateurs.html">← Simulateurs</a>
        <h1 id="tool-page-title">Assurance Vie</h1>
      </nav>

      <section class="tool-layout">
        <section class="tool-overview" aria-label="Synthèse et hypothèses">
          <aside class="tool-params" aria-label="Hypothèses">
            <div class="tool-params-title">
              <h2>Hypothèses</h2>
            </div>
            <div id="fields" class="tool-fields"></div>
          </aside>

          <div class="tool-summary" id="summary"></div>
        </section>

        <section class="tool-detail" aria-label="Projection détaillée">
          <div class="tool-view-toggle" aria-label="Affichage des résultats">
            <button class="is-active" type="button" data-view="chart">Graphique</button>
            <button type="button" data-view="table">Calendrier</button>
          </div>

          <div class="tool-chart-card" id="chart-panel">
            <div class="tool-card-title">
              <h2>Projection</h2>
              <span id="projection-label"></span>
            </div>
            <div class="line-chart" id="chart" aria-label="Graphique de projection"></div>
          </div>
          <div class="tool-table-card" id="table-panel" hidden>
            <div class="tool-card-title">
              <h2>Calendrier annuel</h2>
              <span id="table-note"></span>
            </div>
            <div class="tool-table-wrap">
              <table id="projection-table"></table>
            </div>
          </div>
        </section>
      </section>
    </main>

    <script>
      const formatMoney = (value) => new Intl.NumberFormat("fr-FR", {
        style: "currency",
        currency: "EUR",
        maximumFractionDigits: 0
      }).format(Math.round(value || 0));

      const formatNumber = (value) => new Intl.NumberFormat("fr-FR", {
        maximumFractionDigits: 0
      }).format(Math.round(value || 0));

      const defaults = {
        scpi: {
          rendement: 5,
          versementInitial: 10000,
          versementMensuel: 750,
          dureeVersements: 25,
          dureeTotale: 50,
          reinvestir: false
        },
        av: {
          capitalInitial: 10000,
          versementMensuel: 500,
          dureeTotale: 30,
          rendement: 3,
          frais: 0.6,
          fraisActifs: false,
          fraisEntree: 0,
          fraisEntreeActifs: false
        },
        per: {
          capitalInitial: 5000,
          versementMensuel: 400,
          dureeVersements: 25,
          dureeTotale: 30,
          rendement: 4,
          renteActive: false,
          tauxConversion: 4,
          fraisEntree: 0,
          fraisEntreeActifs: false
        }
      };

      const params = new URLSearchParams(window.location.search);
      const requestedMode = params.get("mode");
      const initialMode = ["av", "scpi", "per"].includes(requestedMode) ? requestedMode : "av";

      const state = {
        mode: initialMode,
        view: "chart",
        values: structuredClone(defaults),
        previousGauge: {}
      };

      const modeContent = {
        av: {
          label: "Assurance Vie",
          title: "Assurance Vie",
          description: "Projection de l'encours dans le temps et visualisation des intérêts composés.",
          chartTitle: "Encours projeté"
        },
        scpi: {
          label: "SCPI",
          title: "SCPI",
          description: "Projection du capital investi et des revenus potentiels générés par les parts.",
          chartTitle: "Capital et revenus"
        },
        per: {
          label: "PER",
          title: "PER",
          description: "Base de projection dédiée au PER, prête à recevoir le volet fiscal.",
          chartTitle: "Capital retraite"
        }
      };

      function computeScpi(values) {
        const rows = [];
        let versementsCumules = 0;
        let capital = 0;
        let revenusCumules = 0;

        for (let annee = 1; annee <= values.dureeTotale; annee++) {
          const versementAnnuel = annee <= values.dureeVersements ? values.versementMensuel * 12 : 0;
          if (annee === 1) {
            versementsCumules = values.versementInitial + versementAnnuel;
            capital = versementsCumules;
          } else {
            versementsCumules += versementAnnuel;
            capital += versementAnnuel;
          }

          const revenuAnnuel = capital * (values.rendement / 100);
          const revenuMensuel = revenuAnnuel / 12;
          revenusCumules += revenuAnnuel;

          if (values.reinvestir) {
            capital += revenuAnnuel;
            versementsCumules += revenuAnnuel;
          }

          rows.push({
            annee,
            versementsCumules,
            versementAnnuel,
            revenuMensuel,
            revenuAnnuel,
            revenusCumules,
            capital
          });
        }
        return rows;
      }

      function computeAssuranceVie(values) {
        const rows = [];
        const rendementNet = Math.max(
          0,
          values.rendement
            - (values.fraisActifs ? values.frais : 0)
        );
        const entreeNet = 1 - (values.fraisEntreeActifs ? values.fraisEntree / 100 : 0);
        let versementsCumules = 0;
        let interetsCumules = 0;
        let capital = 0;

        for (let annee = 1; annee <= values.dureeTotale; annee++) {
          const versementAnnuel = values.versementMensuel * 12;
          const versementAnnuelNet = versementAnnuel * entreeNet;
          if (annee === 1) {
            const capitalInitialNet = values.capitalInitial * entreeNet;
            versementsCumules = values.capitalInitial + versementAnnuel;
            const interetsAnnuels = capitalInitialNet * (rendementNet / 100);
            interetsCumules += interetsAnnuels;
            capital = capitalInitialNet + versementAnnuelNet + interetsAnnuels;
            rows.push({ annee, versementsCumules, versementAnnuel, interetsAnnuels, interetsCumules, capital });
          } else {
            versementsCumules += versementAnnuel;
            const interetsAnnuels = capital * (rendementNet / 100);
            interetsCumules += interetsAnnuels;
            capital = capital + versementAnnuelNet + interetsAnnuels;
            rows.push({ annee, versementsCumules, versementAnnuel, interetsAnnuels, interetsCumules, capital });
          }
        }
        return rows;
      }

      function computePer(values) {
        const rows = [];
        const entreeNet = 1 - (values.fraisEntreeActifs ? values.fraisEntree / 100 : 0);
        let versementsCumules = 0;
        let gainsCumules = 0;
        let capital = 0;

        for (let annee = 1; annee <= values.dureeTotale; annee++) {
          const versementAnnuel = (annee <= values.dureeVersements ? values.versementMensuel * 12 : 0) * entreeNet;
          if (annee === 1) {
            const capitalInitialNet = values.capitalInitial * entreeNet;
            versementsCumules = capitalInitialNet + versementAnnuel;
            const gainsAnnuels = capitalInitialNet * (values.rendement / 100);
            gainsCumules += gainsAnnuels;
            capital = capitalInitialNet + versementAnnuel + gainsAnnuels;
            rows.push({ annee, versementsCumules, versementAnnuel, gainsAnnuels, gainsCumules, capital });
          } else {
            versementsCumules += versementAnnuel;
            const gainsAnnuels = capital * (values.rendement / 100);
            gainsCumules += gainsAnnuels;
            capital = capital + versementAnnuel + gainsAnnuels;
            const renteMensuelle = values.renteActive && annee === values.dureeTotale
              ? capital * (values.tauxConversion / 100) / 12
              : undefined;
            rows.push({ annee, versementsCumules, versementAnnuel, gainsAnnuels, gainsCumules, capital, renteMensuelle });
          }
        }
        return rows;
      }

      const fieldDefinitions = {
        scpi: [
          { key: "rendement", label: "Taux de rendement", type: "number", min: 0, max: 15, step: 0.1, suffix: "%" },
          { key: "versementInitial", label: "Versement initial", type: "number", min: 0, max: 500000, step: 1000, suffix: "€" },
          { key: "versementMensuel", label: "Versement mensuel", type: "number", min: 0, max: 10000, step: 50, suffix: "€" },
          { key: "dureeVersements", label: "Durée des versements", type: "number", min: 1, max: 50, step: 1, suffix: "ans" },
          { key: "dureeTotale", label: "Durée totale", type: "number", min: 1, max: 60, step: 1, suffix: "ans" },
          { key: "reinvestir", label: "Réinvestir les loyers", type: "checkbox" }
        ],
        av: [
          { key: "capitalInitial", label: "Versement initial", type: "number", min: 0, max: 500000, step: 1000, suffix: "€" },
          { key: "versementMensuel", label: "Versement mensuel", type: "number", min: 0, max: 10000, step: 50, suffix: "€" },
          { key: "rendement", label: "Taux d'intérêt annuel", type: "number", min: 0, max: 15, step: 0.1, suffix: "%" },
          { key: "dureeTotale", label: "Durée totale", type: "number", min: 1, max: 60, step: 1, suffix: "ans" },
          { key: "fraisEntreeActifs", label: "Droits d'entrée", type: "checkbox" },
          { key: "fraisEntree", label: "Taux des droits d'entrée", type: "number", min: 0, max: 4.8, step: 0.1, suffix: "%", dependsOn: "fraisEntreeActifs" },
          { key: "fraisActifs", label: "Frais de gestion annuels", type: "checkbox" },
          { key: "frais", label: "Taux de frais de gestion", type: "number", min: 0, max: 3, step: 0.1, suffix: "%", dependsOn: "fraisActifs" }
        ],
        per: [
          { key: "rendement", label: "Taux de rentabilité", type: "number", min: 0, max: 15, step: 0.1, suffix: "%" },
          { key: "capitalInitial", label: "Capital initial", type: "number", min: 0, max: 500000, step: 1000, suffix: "€" },
          { key: "versementMensuel", label: "Versement mensuel", type: "number", min: 0, max: 10000, step: 50, suffix: "€" },
          { key: "dureeVersements", label: "Durée des versements", type: "number", min: 1, max: 50, step: 1, suffix: "ans" },
          { key: "dureeTotale", label: "Durée totale", type: "number", min: 1, max: 60, step: 1, suffix: "ans" },
          { key: "fraisEntreeActifs", label: "Frais d'entrée", type: "checkbox" },
          { key: "fraisEntree", label: "Taux de frais d'entrée", type: "number", min: 0, max: 4.8, step: 0.1, suffix: "%", dependsOn: "fraisEntreeActifs" },
          { key: "renteActive", label: "Sortie en rente", type: "checkbox" },
          { key: "tauxConversion", label: "Taux de conversion", type: "number", min: 1, max: 10, step: 0.1, suffix: "%", dependsOn: "renteActive" }
        ]
      };

      function rowsForMode() {
        if (state.mode === "scpi") return computeScpi(state.values.scpi);
        if (state.mode === "av") return computeAssuranceVie(state.values.av);
        return computePer(state.values.per);
      }

      function parseInputNumber(value) {
        const normalized = String(value || "")
          .replace(/\s/g, "")
          .replace(",", ".");
        return Number(normalized || 0);
      }

      function formatInputNumber(value) {
        const number = Number(value || 0);
        if (!Number.isFinite(number)) return "";
        const [integer, decimal] = String(number).split(".");
        const formattedInteger = integer.replace(/\B(?=(\d{3})+(?!\d))/g, " ");
        return decimal ? `${formattedInteger},${decimal}` : formattedInteger;
      }

      function renderFields() {
        const fields = document.querySelector("#fields");
        const values = state.values[state.mode];
        fields.innerHTML = "";

        const updateRangeProgress = (range) => {
          const min = Number(range.min || 0);
          const max = Number(range.max || 100);
          const value = Number(range.value || 0);
          const progress = max > min ? ((value - min) / (max - min)) * 100 : 0;
          range.style.setProperty("--range-progress", `${Math.max(0, Math.min(100, progress))}%`);
        };

        const renderNumberField = (field, options = {}) => {
          const label = document.createElement("label");
          label.className = options.mini ? "tool-fee-rate" : "tool-field";

          const span = document.createElement("span");
          span.textContent = field.label;
          label.append(span);

          const control = document.createElement("div");
          control.className = "tool-input-wrap";
          const input = document.createElement("input");
          input.type = "text";
          input.inputMode = "decimal";
          input.min = field.min;
          input.max = field.max;
          input.step = field.step;
          input.value = formatInputNumber(values[field.key]);
          const range = document.createElement("input");
          range.className = options.mini ? "tool-range tool-range-mini" : "tool-range";
          range.type = "range";
          range.min = field.min;
          range.max = field.max;
          range.step = field.step;
          range.value = values[field.key];
          updateRangeProgress(range);
          input.addEventListener("input", () => {
            values[field.key] = parseInputNumber(input.value);
            range.value = values[field.key];
            updateRangeProgress(range);
            renderOutputs();
          });
          input.addEventListener("blur", () => {
            input.value = formatInputNumber(values[field.key]);
          });
          range.addEventListener("input", () => {
            values[field.key] = Number(range.value || 0);
            input.value = formatInputNumber(values[field.key]);
            updateRangeProgress(range);
            renderOutputs();
          });
          const suffix = document.createElement("small");
          suffix.textContent = field.suffix;
          control.append(input, suffix);
          label.append(control);
          label.append(range);
          return label;
        };

        const renderFees = () => {
          const feeGroup = document.createElement("div");
          feeGroup.className = "tool-fee-group";

          [
            {
              toggleKey: "fraisEntreeActifs",
              valueKey: "fraisEntree",
              label: "Droits d'entrée",
              rateLabel: "Taux",
              max: 4.8
            },
            {
              toggleKey: "fraisActifs",
              valueKey: "frais",
              label: "Frais de gestion",
              rateLabel: "Taux annuel",
              max: 3
            }
          ].forEach((fee) => {
            const card = document.createElement("div");
            card.className = "tool-fee-card";
            const toggle = document.createElement("label");
            toggle.className = "tool-fee-toggle";
            const title = document.createElement("span");
            title.textContent = fee.label;
            const input = document.createElement("input");
            input.type = "checkbox";
            input.checked = values[fee.toggleKey];
            input.addEventListener("change", () => {
              values[fee.toggleKey] = input.checked;
              renderFields();
              renderOutputs();
            });
            toggle.append(title, input);
            card.append(toggle);

            if (values[fee.toggleKey]) {
              card.append(renderNumberField({
                key: fee.valueKey,
                label: fee.rateLabel,
                type: "number",
                min: 0,
                max: fee.max,
                step: 0.1,
                suffix: "%"
              }, { mini: true }));
            }

            feeGroup.append(card);
          });

          fields.append(feeGroup);
        };

        fieldDefinitions[state.mode].forEach((field) => {
          if (field.dependsOn && !values[field.dependsOn]) return;
          if (state.mode === "av" && ["fraisEntreeActifs", "fraisEntree", "fraisActifs", "frais"].includes(field.key)) return;

          if (field.type !== "checkbox") {
            fields.append(renderNumberField(field));
            return;
          }

          const label = document.createElement("label");
          label.className = "tool-switch-row";

          const span = document.createElement("span");
          span.textContent = field.label;
          label.append(span);

          const input = document.createElement("input");
          input.type = "checkbox";
          input.checked = values[field.key];
          input.addEventListener("change", () => {
            values[field.key] = input.checked;
            render();
          });
          label.append(input);

          fields.append(label);
        });

        if (state.mode === "av") renderFees();
      }

      function renderSummary(rows) {
        const last = rows.at(-1) || {};
        const summary = document.querySelector("#summary");

        if (state.mode === "av") {
          const values = state.values.av;
          const capital = last.capital || 0;
          const invested = last.versementsCumules || 0;
          const interests = last.interetsCumules || 0;
          const investedShare = capital > 0 ? Math.max(0, Math.min(100, (invested / capital) * 100)) : 0;
          const interestsShare = Math.max(0, 100 - investedShare);
          const previousGauge = state.previousGauge.av || { investedShare, interestsShare };
          const multiple = invested > 0 ? capital / invested : 0;
          const annualRate = new Intl.NumberFormat("fr-FR", { maximumFractionDigits: 1 }).format(values.rendement);
          const capitalAmount = formatMoney(capital).replace(/\s?€$/, "");

          summary.innerHTML = `
            <article class="tool-result-card tool-result-editorial">
              <div class="capital-heading">
                <div>
                  <span>Capital final estimé</span>
                  <strong class="capital-amount value-update"><span>${capitalAmount}</span><span class="capital-currency">€</span></strong>
                </div>
              </div>
              <div class="capital-gauge">
                <div class="capital-breakdown-labels">
                  <span class="capital-metric-invested">Sommes investies</span>
                  <span class="capital-metric-interest">Intérêts gagnés</span>
                </div>
                <div class="capital-breakdown" aria-label="Répartition du capital final">
                  <div style="width:${previousGauge.investedShare}%"></div>
                  <div style="width:${previousGauge.interestsShare}%"></div>
                </div>
              </div>
              <div class="capital-metrics">
                <span class="capital-metric-invested"><small>Sommes investies</small><strong class="value-update">${formatMoney(invested)}</strong></span>
                <span class="capital-metric-interest"><small>Intérêts gagnés</small><strong class="value-update">${formatMoney(interests)}</strong></span>
              </div>
              <div class="capital-shares">
                <span><small>Multiple obtenu</small><strong class="value-update">× ${multiple.toFixed(2)}</strong></span>
                <span><small>Part des intérêts gagnés</small><strong class="value-update">${formatNumber(interestsShare)} %</strong></span>
              </div>
              <div class="capital-insight">
                <div class="capital-visual" aria-label="Répartition visuelle du capital projeté">
                  <span style="width:${investedShare}%"></span>
                  <span style="width:${interestsShare}%"></span>
                </div>
                <p>
                  En plaçant ${formatMoney(values.capitalInitial)} aujourd'hui, puis ${formatMoney(values.versementMensuel)}
                  chaque mois pendant ${formatNumber(values.dureeTotale)} ans, à un rendement annuel moyen de
                  ${annualRate} %, votre capital atteindrait ${formatMoney(capital)}.
                </p>
              </div>
            </article>
          `;
          state.previousGauge.av = { investedShare, interestsShare };
          requestAnimationFrame(() => {
            const [investedBar, interestsBar] = summary.querySelectorAll(".capital-breakdown > div");
            if (!investedBar || !interestsBar) return;
            investedBar.style.width = `${investedShare}%`;
            interestsBar.style.width = `${interestsShare}%`;
          });
          return;
        }

        let items;

        if (state.mode === "scpi") {
          items = [
            ["Capital final", formatMoney(last.capital)],
            ["Versements cumulés", formatMoney(last.versementsCumules)],
            ["Revenus cumulés", formatMoney(last.revenusCumules)],
            [`Revenu mensuel an ${state.values.scpi.dureeTotale}`, formatMoney(last.revenuMensuel)]
          ];
        } else if (state.mode === "av") {
          const ratio = last.versementsCumules > 0 ? (last.capital / last.versementsCumules).toFixed(2) : "—";
          items = [
            ["Capital final", formatMoney(last.capital)],
            ["Versements cumulés", formatMoney(last.versementsCumules)],
            ["Intérêts cumulés", formatMoney(last.interetsCumules)],
            ["Capital / versements", `× ${ratio}`]
          ];
        } else {
          items = [
            ["Capital final", formatMoney(last.capital)],
            ["Versements cumulés", formatMoney(last.versementsCumules)],
            ["Gains cumulés", formatMoney(last.gainsCumules)],
            [state.values.per.renteActive ? "Rente mensuelle estimée" : `Gains an ${state.values.per.dureeTotale}`, formatMoney(state.values.per.renteActive ? last.renteMensuelle : last.gainsAnnuels)]
          ];
        }

        summary.innerHTML = items.map(([label, value]) => `
          <article class="tool-result-card">
            <span>${label}</span>
            <strong>${value}</strong>
          </article>
        `).join("");
      }

      function renderChart(rows) {
        const chart = document.querySelector("#chart");
        const width = 960;
        const height = 360;
        const pad = { top: 24, right: 28, bottom: 42, left: 64 };
        const max = Math.max(...rows.flatMap((row) => [
          row.capital || 0,
          row.versementsCumules || 0,
          row.interetsCumules || row.revenusCumules || row.gainsCumules || 0
        ]), 1);
        const x = (index) => pad.left + (index / Math.max(rows.length - 1, 1)) * (width - pad.left - pad.right);
        const y = (value) => height - pad.bottom - (value / max) * (height - pad.top - pad.bottom);
        const metric = state.mode === "scpi" ? "revenusCumules" : state.mode === "av" ? "interetsCumules" : "gainsCumules";
        const metricLabel = state.mode === "scpi" ? "Revenus cumulés" : state.mode === "av" ? "Intérêts gagnés" : "Gains cumulés";
        const pointsFor = (key) => rows.map((row, index) => `${x(index)},${y(row[key] || 0)}`).join(" ");
        const grid = [0.25, 0.5, 0.75, 1].map((ratio) => {
          const value = max * ratio;
          const lineY = y(value);
          return `
            <g>
              <line x1="${pad.left}" y1="${lineY}" x2="${width - pad.right}" y2="${lineY}" />
              <text x="${pad.left - 12}" y="${lineY + 4}">${formatMoney(value)}</text>
            </g>
          `;
        }).join("");
        const tickEvery = Math.max(1, Math.ceil(rows.length / 8));
        const ticks = rows.filter((row) => row.annee === 1 || row.annee === rows.length || row.annee % tickEvery === 0).map((row) => {
          const tickX = x(row.annee - 1);
          return `<text x="${tickX}" y="${height - 10}">${row.annee}</text>`;
        }).join("");

        chart.innerHTML = `
          <div class="chart-totals">
            <span>Capital final <strong>${formatMoney(rows.at(-1)?.capital)}</strong></span>
            <span>${metricLabel} <strong>${formatMoney(rows.at(-1)?.[metric])}</strong></span>
            <span>Sommes investies <strong>${formatMoney(rows.at(-1)?.versementsCumules)}</strong></span>
          </div>
          <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="Evolution annuelle du capital, des intérêts et des sommes investies">
            <g class="chart-grid">${grid}</g>
            <polyline class="chart-line chart-line-capital" points="${pointsFor("capital")}"></polyline>
            <polyline class="chart-line chart-line-gains" points="${pointsFor(metric)}"></polyline>
            <polyline class="chart-line chart-line-invested" points="${pointsFor("versementsCumules")}"></polyline>
            <g class="chart-axis">${ticks}</g>
          </svg>
          <div class="chart-legend">
            <span><i class="legend-capital"></i>Capital final</span>
            <span><i class="legend-gains"></i>${metricLabel}</span>
            <span><i class="legend-invested"></i>Sommes investies</span>
          </div>
        `;
      }

      function renderTable(rows) {
        const table = document.querySelector("#projection-table");
        let headers;
        let mapper;
        if (state.mode === "scpi") {
          headers = ["Année", "Versements", "Revenu mensuel", "Revenus cumulés", "Capital"];
          mapper = (row) => [row.annee, formatMoney(row.versementsCumules), formatMoney(row.revenuMensuel), formatMoney(row.revenusCumules), formatMoney(row.capital)];
        } else if (state.mode === "av") {
          headers = ["Année", "Versements", "Intérêts annuels", "Intérêts cumulés", "Capital"];
          mapper = (row) => [row.annee, formatMoney(row.versementsCumules), formatMoney(row.interetsAnnuels), formatMoney(row.interetsCumules), formatMoney(row.capital)];
        } else {
          headers = ["Année", "Versements", "Gains annuels", "Gains cumulés", "Capital"];
          mapper = (row) => [row.annee, formatMoney(row.versementsCumules), formatMoney(row.gainsAnnuels), formatMoney(row.gainsCumules), formatMoney(row.capital)];
        }

        table.innerHTML = `
          <thead><tr>${headers.map((head) => `<th>${head}</th>`).join("")}</tr></thead>
          <tbody>${rows.map((row) => `<tr>${mapper(row).map((cell) => `<td>${cell}</td>`).join("")}</tr>`).join("")}</tbody>
        `;
      }

      function renderOutputs() {
        const rows = rowsForMode();
        const content = modeContent[state.mode];
        document.title = `${content.title} | Simulateur`;
        document.querySelector("#tool-page-title").textContent = content.title;
        document.querySelector(".tool-card-title h2").textContent = content.chartTitle;
        document.querySelector("#projection-label").textContent = content.label;
        document.querySelector("#table-note").textContent = `${rows.length} années`;
        renderSummary(rows);
        renderChart(rows);
        renderTable(rows);
      }

      function render() {
        renderFields();
        renderOutputs();
      }

      document.querySelectorAll(".tool-view-toggle button").forEach((button) => {
        button.addEventListener("click", () => {
          state.view = button.dataset.view;
          document.querySelectorAll(".tool-view-toggle button").forEach((item) => {
            item.classList.toggle("is-active", item === button);
          });
          document.querySelector("#chart-panel").hidden = state.view !== "chart";
          document.querySelector("#table-panel").hidden = state.view !== "table";
        });
      });

      render();
    </script>
  </body>
</html>
